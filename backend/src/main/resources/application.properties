# Application Configuration
spring.application.name=bookkaro-backend

# Data Initialization Control
# DISABLED - Use PowerShell script to populate database from CSV
# Do not use built-in data initializers
app.data.init.enabled=false

# Server Configuration
server.port=${PORT:8081}
server.servlet.context-path=/api/v1

# CORS Configuration
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookkarodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration - Reduced for Development
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate Configuration
# Using 'none' to avoid schema modifications since DB already has all tables
# Schema is managed through migrations
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Enable open-in-view to prevent lazy loading errors (temporary fix)
spring.jpa.open-in-view=true

# JWT Configuration
jwt.secret=${JWT_SECRET:bookkaroSecretKey2025ThisIsAVeryLongSecretKeyForJWTTokenGeneration}
jwt.expiration=86400000

# Logging Configuration (Production-optimized)
logging.level.root=WARN
logging.level.com.bookkaro=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
# Suppress Spring Security AuthenticationManager warning (our config is intentional)
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator (Minimal for Health Checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
