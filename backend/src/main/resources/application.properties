# Application Configuration
spring.application.name=bookaro-backend

# Server Configuration
server.port=${PORT:8081}
server.servlet.context-path=/api/v1

# Startup Optimization - Lazy Initialization
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookarodb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Optimization (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Hibernate Performance Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# Disable DevTools in Production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:bookaroSecretKey2025ThisIsAVeryLongSecretKeyForJWTTokenGeneration}
jwt.expiration=86400000

# Logging Configuration (Production-optimized)
logging.level.root=WARN
logging.level.com.bookaro=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator (Minimal for Health Checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
